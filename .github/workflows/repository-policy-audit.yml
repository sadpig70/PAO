name: Repository Policy Audit

on:
  push:
    branches:
      - main
    paths:
      - ".github/repository-policy.json"
      - ".github/workflows/repository-policy-audit.yml"
      - "tools/verify_repository_policy.py"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-policy-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Audit main protection
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Audit live branch protection
        env:
          GITHUB_TOKEN: ${{ secrets.REPOSITORY_POLICY_AUDIT_TOKEN }}
        run: >-
          python tools/verify_repository_policy.py
          --policy .github/repository-policy.json
          --repository "$GITHUB_REPOSITORY"
