name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Compile Python
        run: python -m compileall -q .agents/skills/pao-lwar .agents/skills/pao-oa tests tools

      - name: Run tests
        if: ${{ !cancelled() }}
        env:
          TEMP: ${{ runner.temp }}
          TMP: ${{ runner.temp }}
          TMPDIR: ${{ runner.temp }}
        run: python -m unittest discover -s tests -q

      - name: Check bundle byte-sync
        if: ${{ !cancelled() }}
        run: python tools/sync_bundles.py --check
