name: PR Evidence

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  group: pr-evidence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  evaluate:
    name: PR Evidence Evaluator
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out trusted base revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Validate and publish trusted check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/verify_pr_evidence.py --event "$GITHUB_EVENT_PATH" --publish-check
